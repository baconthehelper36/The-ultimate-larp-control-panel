<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultimate LARP Control Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-cyan-500 via-cyan-400 to-white text-gray-900 font-sans">

<!-- ===== LOGO TOP RIGHT ===== -->
<img src="https://i.imgur.com/GOk8CHv.png"
     class="fixed top-4 right-4 w-20 h-20 rounded-xl shadow-lg border border-white/50 z-50"
     alt="LARP Logo" />

<!-- ===== PLAYER PANEL ===== -->
<div class="fixed bottom-4 right-4 bg-white/90 backdrop-blur p-4 rounded-xl shadow-xl border border-cyan-200 w-52 z-50">
  <h4 class="font-bold text-cyan-700 mb-1">Server Status</h4>
  <p id="playerCount" class="text-sm">Players: --</p>
</div>

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="bg-white/90 backdrop-blur p-10 rounded-2xl shadow-2xl w-96 text-center border border-cyan-200">

    <h1 class="text-2xl font-bold mb-2 text-cyan-700">
      The Ultimate LARP Control Panel
    </h1>

    <img src="https://i.imgur.com/GOk8CHv.png"
         class="mx-auto mb-6 w-20 h-20 rounded-xl shadow-md" />

    <input id="passwordInput" type="password" placeholder="Enter password"
      class="w-full p-3 rounded-lg bg-white border border-cyan-300 mb-4 outline-none focus:ring-2 focus:ring-cyan-400" />

    <button onclick="login()"
      class="w-full bg-gradient-to-r from-cyan-500 to-cyan-400 hover:from-cyan-600 hover:to-cyan-500 text-white p-3 rounded-xl font-semibold shadow-lg">
      Access Panel
    </button>

    <p id="errorText" class="text-red-500 mt-3 hidden">Wrong password.</p>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard" class="hidden">

  <nav class="bg-gradient-to-r from-cyan-600 to-cyan-400 p-5 text-xl font-bold text-white shadow-lg">
    Ultimate LARP Control Panel
  </nav>

  <section class="p-8 max-w-5xl mx-auto">

    <!-- ===== CREATE INFRACTION ===== -->
    <div class="bg-white/90 backdrop-blur p-5 rounded-xl shadow-md border border-cyan-200 mb-6">
      <h2 class="text-xl font-bold text-cyan-700 mb-3">Create Infraction</h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <input id="userId" class="p-2 border rounded-lg" placeholder="User ID">
        <input id="moderator" class="p-2 border rounded-lg" placeholder="Moderator">
        <input id="action" class="p-2 border rounded-lg" placeholder="Action (Warn/Kick/Ban)">
        <input id="reason" class="p-2 border rounded-lg" placeholder="Reason">
      </div>

      <button onclick="submitInfraction()"
        class="mt-3 w-full bg-cyan-600 hover:bg-cyan-700 text-white p-2 rounded-lg font-medium">
        Submit Infraction
      </button>
    </div>

    <!-- ===== VIEW BUTTON ===== -->
    <button onclick="toggleInfractions()"
      class="mb-4 bg-cyan-600 hover:bg-cyan-700 text-white px-6 py-3 rounded-xl shadow-lg font-semibold">
      Toggle Infraction Logs
    </button>

    <!-- ===== INFRACTION LIST ===== -->
    <div id="infractionsPanel"
         class="hidden bg-white/90 backdrop-blur p-5 rounded-xl shadow-md border border-cyan-200">

      <h3 class="text-xl font-bold text-cyan-700 mb-3">Infraction Logs</h3>

      <div id="infractionsList" class="space-y-2">
        <p class="text-sm text-gray-500">Loading...</p>
      </div>

    </div>

  </section>
</div>

<script>
// ===== ERLC API =====
const ERLC_API_KEY = "fdWKTlzxNscCtrAOfHKj-ltorbrRrkLufkrZtczFpOjPugSKwUagwpjzYSRYR";

// ===== PASSWORD =====
const PASSWORD = "225";

// ===== AUTO LOGIN =====
window.onload = () => {
  if (sessionStorage.getItem("larpLoggedIn") === "true") {
    showDashboard();
  }

  fetchPlayerCount();
  fetchInfractions();

  setInterval(fetchPlayerCount, 30000);
  setInterval(fetchInfractions, 10000);
};

// ===== LOGIN =====
function login() {
  const pass = document.getElementById("passwordInput").value.trim();

  if (pass !== PASSWORD) {
    document.getElementById("errorText").classList.remove("hidden");
    return;
  }

  sessionStorage.setItem("larpLoggedIn", "true");
  showDashboard();
}

// ===== SHOW DASHBOARD =====
function showDashboard() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

// ===== TOGGLE INFRACTIONS =====
function toggleInfractions() {
  document.getElementById("infractionsPanel").classList.toggle("hidden");
}

// ===== PLAYER COUNT =====
async function fetchPlayerCount() {
  try {
    const res = await fetch(
      "https://api.policeroleplay.community/v1/server",
      { headers: { "Server-Key": ERLC_API_KEY } }
    );

    const data = await res.json();

    document.getElementById("playerCount").textContent =
      "Players: " + (data.CurrentPlayers ?? "--");
  } catch {
    document.getElementById("playerCount").textContent =
      "Players: Error";
  }
}

// ===== SUBMIT INFRACTION =====
async function submitInfraction() {
  const payload = {
    userId: document.getElementById("userId").value,
    moderator: document.getElementById("moderator").value,
    action: document.getElementById("action").value,
    reason: document.getElementById("reason").value
  };

  await fetch("/api/infraction", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  fetchInfractions();
}

// ===== FETCH INFRACTIONS =====
async function fetchInfractions() {
  try {
    const res = await fetch("/api/infractions");
    const data = await res.json();

    const container = document.getElementById("infractionsList");

    container.innerHTML = data.length
      ? data.map(log => `
          <div class="p-3 bg-cyan-50 rounded-lg border">
            <p class="text-sm">${log.content}</p>
            <p class="text-xs text-gray-500">${log.time}</p>
          </div>
        `).join("")
      : "<p class='text-sm text-gray-500'>No infractions yet.</p>";
  } catch {
    document.getElementById("infractionsList").innerHTML =
      "<p class='text-sm text-red-500'>Failed to load logs.</p>";
  }
}
</script>

</body>
</html>
