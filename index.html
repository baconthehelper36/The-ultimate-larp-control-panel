<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultimate LARP Control Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-cyan-500 via-cyan-400 to-white text-gray-900 font-sans">

<!-- ===== LOGO TOP RIGHT ===== -->
<img src="https://i.imgur.com/GOk8CHv.png"
     class="fixed top-4 right-4 w-20 h-20 rounded-xl shadow-lg border border-white/50 z-50"
     alt="LARP Logo" />

<!-- ===== LOGIN SCREEN ===== -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center">
  <div class="bg-white/90 backdrop-blur p-10 rounded-2xl shadow-2xl w-96 text-center border border-cyan-200">

    <h1 class="text-2xl font-bold mb-2 text-cyan-700">
      The Ultimate LARP Control Panel
    </h1>

    <img src="https://i.imgur.com/GOk8CHv.png"
         class="mx-auto mb-6 w-20 h-20 rounded-xl shadow-md" />

    <input id="passwordInput" type="password" placeholder="Enter password"
      class="w-full p-3 rounded-lg bg-white border border-cyan-300 mb-4 outline-none focus:ring-2 focus:ring-cyan-400" />

    <button onclick="login()"
      class="w-full bg-gradient-to-r from-cyan-500 to-cyan-400 hover:from-cyan-600 hover:to-cyan-500 text-white p-3 rounded-xl font-semibold shadow-lg">
      Access Panel
    </button>

    <p id="errorText" class="text-red-500 mt-3 hidden">Wrong password.</p>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard" class="hidden">

  <!-- TOP BAR -->
  <nav class="bg-gradient-to-r from-cyan-600 to-cyan-400 p-5 text-xl font-bold text-white shadow-lg flex justify-between items-center">
    <span>Ultimate LARP Control Panel</span>

    <div class="flex gap-3">
      <button onclick="openPanel('homePanel')"
        class="bg-white/20 hover:bg-white/30 px-4 py-1 rounded-lg text-sm">
        Home
      </button>

      <button onclick="openPanel('sessionPanel')"
        class="bg-white/20 hover:bg-white/30 px-4 py-1 rounded-lg text-sm">
        Session Analytics
      </button>
    </div>
  </nav>

  <!-- MAIN AREA -->
  <section class="p-8 max-w-5xl mx-auto">

    <!-- ===== HOME PANEL ===== -->
    <div id="homePanel" class="control-panel">
      <div class="bg-white/90 backdrop-blur p-10 rounded-xl border border-cyan-200 shadow-md text-center">
        <h2 class="text-2xl font-bold text-cyan-700 mb-3">
          Control Panel Ready
        </h2>
        <p class="text-gray-600">
          Select a tool from the top right. More admin tools can be added later.
        </p>
      </div>
    </div>

    <!-- ===== SESSION PANEL ===== -->
    <div id="sessionPanel"
         class="control-panel hidden bg-white/90 backdrop-blur p-6 rounded-xl shadow-md border border-cyan-200">

      <h2 class="text-2xl font-bold text-cyan-700 mb-6">
        Live Session Monitor
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- PLAYER COUNT -->
        <div class="bg-cyan-50 p-6 rounded-xl border shadow-sm">
          <h3 class="text-lg font-semibold text-cyan-800 mb-2">
            Live Players
          </h3>
          <p id="playerCountBig" class="text-3xl font-bold text-cyan-700">
            --
          </p>
        </div>

        <!-- MOD CALLS -->
        <div class="bg-cyan-50 p-6 rounded-xl border shadow-sm">
          <h3 class="text-lg font-semibold text-cyan-800 mb-2">
            Active Mod Calls
          </h3>
          <p id="modCallsCount" class="text-3xl font-bold text-cyan-700">
            --
          </p>
        </div>

      </div>

    </div>

  </section>
</div>

<script>
// ===== ERLC API =====
const ERLC_API_KEY = "fdWKTlzxNscCtrAOfHKj-ltorbrRrkLufkrZtczFpOjPugSKwUagwpjzYSRYR";

// endpoints
const ERLC_SERVER_ENDPOINT = "https://api.policeroleplay.community/v1/server";
const ERLC_STAFFCALLS_ENDPOINT = "https://api.policeroleplay.community/v1/server/staffcalls";

// ===== PASSWORD =====
const PASSWORD = "225";

// ===== AUTO LOGIN =====
window.onload = () => {
  if (sessionStorage.getItem("larpLoggedIn") === "true") {
    showDashboard();
  }

  fetchServerStats();
  fetchModCalls();

  setInterval(fetchServerStats, 15000);
  setInterval(fetchModCalls, 8000);
};

// ===== LOGIN =====
function login() {
  const pass = document.getElementById("passwordInput").value.trim();

  if (pass !== PASSWORD) {
    document.getElementById("errorText").classList.remove("hidden");
    return;
  }

  sessionStorage.setItem("larpLoggedIn", "true");
  showDashboard();
}

// ===== SHOW DASHBOARD =====
function showDashboard() {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
}

// ===== PANEL SYSTEM =====
function openPanel(panelId) {
  document.querySelectorAll(".control-panel").forEach(p => {
    p.classList.add("hidden");
  });

  document.getElementById(panelId)?.classList.remove("hidden");
}

// ===== PLAYER COUNT =====
async function fetchServerStats() {
  try {
    const res = await fetch(ERLC_SERVER_ENDPOINT, {
      headers: { "Server-Key": ERLC_API_KEY }
    });

    const data = await res.json();

    const players =
      data.CurrentPlayers ??
      data.PlayerCount ??
      "--";

    document.getElementById("playerCountBig").textContent = players;

  } catch {
    document.getElementById("playerCountBig").textContent = "Error";
  }
}

// ===== REAL MOD CALL COUNT =====
async function fetchModCalls() {
  try {
    const res = await fetch(ERLC_STAFFCALLS_ENDPOINT, {
      headers: { "Server-Key": ERLC_API_KEY }
    });

    const data = await res.json();

    const count = Array.isArray(data) ? data.length : 0;

    document.getElementById("modCallsCount").textContent = count;

  } catch {
    document.getElementById("modCallsCount").textContent = "--";
  }
}
</script>

</body>
</html>
